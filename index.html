<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Grande Traversée des Pyrénées</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ==" crossorigin="" />
  <link rel="icon" href="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/icon.svg" type="image/svg+xml">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .leaflet-marker-icon {
      pointer-events: none;
    }

    .leaflet-interactive {
      pointer-events: none;
    }

    .custom-icon {
      display: block;
      width: 0;
      height: 0;
    }

    .custom-attribution {
      background: white;
      padding: 0.3125rem; /* 5px */
      border-radius: 0.1875rem; /* 3px */
      font-size: 0.75rem; /* 12px */
      color: #333;
      z-index: 1000;
      text-align: right;
      bottom: 0;
      right: 0;
      margin: 0;
    }

    .custom-attribution a {
      color: #333;
      text-decoration: none;
    }

    .custom-attribution a:hover {
      text-decoration: underline;
    }

    .rotating-icon img {
      animation: spin 4s linear infinite;
      width: 5.625rem; /* 90px */
      height: 5.625rem; /* 90px */
      pointer-events: none;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg) scale(1);
      }
      25% {
        transform: rotate(90deg) scale(0.7);
      }
      50% {
        transform: rotate(180deg) scale(1);
      }
      75% {
        transform: rotate(270deg) scale(0.7);
      }
      100% {
        transform: rotate(360deg) scale(1);
      }
    }

    .leaflet-container {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    .leaflet-container {
      touch-action: none;
    }

    #fixed-image {
      position: fixed;
      top: 0.625rem; /* 10px */
      right: 0.625rem; /* 10px */
      z-index: 9999;
      height: 5rem; 
      width: auto;
    }
  </style>
</head>

<body>
  <img id="fixed-image" src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/logo.svg" alt="Logo" />

  <div id="map"></div>

  <audio id="click-sound" src="https://cdn.pixabay.com/download/audio/2023/12/09/audio_37d2c0e795.mp3"></audio> <!-- Remplacez par le lien vers votre son -->

  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js" integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew==" crossorigin=""></script>
  <script>
    const map = L.map('map').setView([0, 0], 15); // Vue initiale
    L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png', {
      maxZoom: 15,
      minZoom: 6
    }).addTo(map);

    const defaultAttributionControl = map.attributionControl;
    if (defaultAttributionControl) {
      map.removeControl(defaultAttributionControl);
    }

    const customAttributionControl = L.control({
      position: 'bottomright'
    });

    customAttributionControl.onAdd = function() {
      const div = L.DomUtil.create('div', 'custom-attribution');
      div.innerHTML =
        '<a href="https://www.instagram.com/teorpkt" target="_blank">@teorpkt</a> | Crédits: <a href="https://www.openstreetmap.org/" target="_blank">OpenStreetMap</a> / <a href="https://www.cartodb.com/locations/" target="_blank">CartoDB</a> / <a href="https://leafletjs.com/" target="_blank">Leaflet</a>';
      return div;
    };

    customAttributionControl.addTo(map);

    const apiUrl = 'https://script.google.com/macros/s/AKfycbyCQthvDiyh-DryYVVQP6dKYjSIOnpzwfj4RE_Qjyy_vpZbSjjVJEFHR0OXYXOCpayL/exec';

    fetch(apiUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error('Erreur HTTP! Statut: ' + response.status);
        }
        return response.json();
      })
      .then(data => {
        if (Array.isArray(data) && data.length > 0 && data[0].hasOwnProperty('lat') && data[0].hasOwnProperty('lng')) {
          const latlngs = data.map(point => [point.lat, point.lng]);
          const lastPoint = latlngs[latlngs.length - 1];

          // Centrage et zoom sur le dernier point
          map.setView(lastPoint, 10);

          const lastIcon = L.divIcon({
            className: 'rotating-icon',
            html: '<img src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/icon.svg" alt="Icon"/>',
            iconSize: ['90', '90'], /* 90px */
            iconAnchor: ['45', '45'] /* 45px */
          });

          latlngs.forEach((latlng, index) => {
            const icon = index === latlngs.length - 1 ? lastIcon : L.divIcon({
              className: 'custom-icon',
              iconSize: ['0', '0']
            });

            const marker = L.marker(latlng, {
              icon: icon,
              interactive: index === latlngs.length - 1
            }).addTo(map);

            if (index === latlngs.length - 1) {
              marker.on('click', function() {
                const sound = document.getElementById('click-sound');
                sound.play();
              });
            }
          });

          L.polyline(latlngs, {
            color: '#DD4A25',
            weight: 0.1875 /* 3px */,
            interactive: false
          }).addTo(map);
        }
      });
  </script>
</body>

</html>
