<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Grande Traversée des Pyrénées</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ==" crossorigin="" />
  <link rel="icon" href="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap">
  <style>
    * { font-family: 'Roboto Mono', monospace; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #map { height: 100%; width: 100%; }
    .leaflet-marker-icon, .leaflet-interactive { pointer-events: none; }
    .custom-icon { width: 10px; height: 10px; background: #000; border-radius: 50%; }
    .rotating-icon img { width: 5.625rem; height: 5.625rem; animation: spin 5s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #fixed-image { position: fixed; bottom: 0.625rem; right: 0.625rem; height: 5rem; transform: rotate(2deg); }
    #loading-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,1); display: flex; justify-content: center; align-items: center; }
    #loading-modal p { margin: 0; font-size: 1rem; color: #000; }
    .leaflet-control-attribution { display: none; }
  </style>
</head>
<body>
  <div id="loading-modal"><p>Chargement...</p></div>
  <img id="fixed-image" src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/logo.svg" alt="Logo"/>
  <div id="map"></div>
  <audio id="click-sound" src="https://cdn.pixabay.com/download/audio/2023/12/09/audio_37d2c0e795.mp3"></audio>
  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js" integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew==" crossorigin=""></script>
  <script>
    const map = L.map('map').setView([0, 0], 15);
    const baseMaps = {
      "Carte OpenStreetMap": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '' }),
      "Carte minimaliste": L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png', { maxZoom: 15, minZoom: 6, attribution: '' })
    };
    L.control.layers(baseMaps).addTo(map);
    baseMaps["Carte minimaliste"].addTo(map);

    fetch('https://script.google.com/macros/s/AKfycbwo5X8Fkf1fJKowKsxiLNiV5La_zaBFKChObf1C1OYWfsnDt1vG0uvXgEwxthiRE_5Z/exec')
      .then(response => response.json())
      .then(data => {
        if (Array.isArray(data) && data.length && data[0].lat && data[0].lng) {
          const latlngs = data.map(p => [p.lat, p.lng]);
          map.setView(latlngs[latlngs.length - 1], 10);

          const lastIcon = L.divIcon({ className: 'rotating-icon', html: '<img src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/icon.svg" />', iconSize: [90, 90], iconAnchor: [45, 45] });
          latlngs.forEach((latlng, i) => {
            const icon = i === latlngs.length - 1 ? lastIcon : L.divIcon({ className: 'custom-icon', iconSize: [10, 10], iconAnchor: [5, 5] });
            const marker = L.marker(latlng, { icon, interactive: i === latlngs.length - 1 }).addTo(map);
            if (i === latlngs.length - 1) marker.on('click', () => document.getElementById('click-sound').play());
          });
          L.polyline(latlngs, { color: '#000', weight: 3, interactive: false }).addTo(map);
          document.getElementById('loading-modal').style.display = 'none';
        }
      })
      .catch(error => {
        console.error('Erreur:', error);
        document.getElementById('loading-modal').style.display = 'none';
      });
  </script>
</body>
</html>
