        padding: 4px !important;
        font-size: 0.9rem !important;
        border: none !important;
      }
    </style>
  </head>
  <body>
    <div id="loading-modal">
      <p id="loading-text">Chargement</p>
    </div>
    <div id="map">
      <img
        id="top-right-image"
        src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/src/Titre.svg"
        alt="Panneau"
      />
      <img
        id="bottom-left-image"
        src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/src/Direction.svg"
        alt="Sens de marche"
      />
    </div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
      const phrases = [
        "Clarisse espère que le sommet est juste une illusion d’optique.",
        "Téo rêve d’une pizza…",
        "Clarisse ne sait pas si c’est de la sueur ou ses larmes.",
        "Clarisse aimerait voir un ours… mais pas trop près quand même.",
        "Téo a mangé tout son saucisson à la première pause. Rando stratégique.",
        "Clarisse réalise que « point de vue panoramique » est un synonyme de souffrance.",
        "Téo considère sérieusement l’idée de se téléporter directement à la pizza de fin du périple.",
        "Clarisse se demande si son sac pèse plus lourd que ses regrets.",
        "Clarisse réalise qu’il y a deux types de randonneurs : ceux qui se plaignent, et les menteurs.",
        "Téo a calculé que chaque montée lui coûte environ deux rêves de pizza.",
        "Téo se demande si ses pieds se sont transformés en briques pendant la nuit.",
        "Clarisse sourit en voyant la vue, puis se rappelle qu’il faut redescendre.",
        "Clarisse a vu un panneau indiquant 3 km… il y a 5 km.",
        "Clarisse se demande pourquoi personne ne lui a dit que « descente » était aussi un mot code pour « douleur ».",
        "Téo a décidé que sa prochaine aventure sera sur le canapé, avec une télécommande et un paquet de chips.",
        "Clarisse espère que ce nuage noir est juste là pour la déco, et pas pour une douche surprise.",
        "Téo a vu un cerf dans la brume… ou alors c’était une hallucination à cause de son saucisson lyophilisé.",
        "Téo vérifie son appli météo toutes les deux minutes, comme si ça allait changer la tempête en barbecue.",
        "Téo se demande si ses pets suffiraient à gonfler un matelas de randonnée.",
        "Clarisse croit entendre un sanglier dans la nuit… avant de comprendre que c’est juste son propre ronflement qui résonne dans la tente.",
        "Téo se demande si les GPS sont programmés pour perdre le signal juste quand tu es le plus désespéré.",
        "Clarisse a décidé que les moustiques étaient des créatures des ténèbres envoyées pour tester sa patience."
      ];

      function getRandomPhrase() {
        const index = Math.floor(Math.random() * phrases.length);
        return phrases[index];
      }

      const map = L.map('map').setView([42.9, 0.4], 8);
      const apiKey = '63bb7de826d04b8796d145feb72c3362';
      const baseMaps = {
        "Carte Thunderforest": L.tileLayer(`https://tile.thunderforest.com/landscape/{z}/{x}/{y}.png?apikey=${apiKey}`, {
          maxZoom: 22,
          minZoom: 6,
          opacity: 0.8
        })
      };

      baseMaps["Carte Thunderforest"].addTo(map);

     fetch('https://script.google.com/macros/s/AKfycbwo5X8Fkf1fJKowKsxiLNiV5La_zaBFKChObf1C1OYWfsnDt1vG0uvXgEwxthiRE_5Z/exec')
  .then(response => response.json())
  .then(data => {
    if (Array.isArray(data) && data.length && data[0].lat && data[0].lng) {
      const latlngs = data.map(p => [p.lat, p.lng]);

      map.setView(latlngs[latlngs.length - 1], 10);

      const lastIcon = L.divIcon({
        className: 'rotating-icon',
        html: '<img src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/src/T%C3%AAtes.svg"/>',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });

      const firstIcon = L.divIcon({
        className: 'custom-icon',
        iconSize: [6, 6],
        iconAnchor: [3, 3]
      });

      // Ajouter un marker pour chaque point sauf le dernier
      latlngs.slice(0, -1).forEach(latlng => {
        L.marker(latlng, { icon: firstIcon, interactive: false }).addTo(map);
      });

      // Ajouter un marker pour le dernier point avec une icône personnalisée
      const marker = L.marker(latlngs[latlngs.length - 1], { icon: lastIcon, interactive: true }).addTo(map);
      marker.bindPopup(getRandomPhrase, {
        offset: L.point(0, -50)
      }).on('click', function() {
        this.setContent(getRandomPhrase());
        this.openPopup();
      });

      // Dessiner la polyline en trois étapes :
      
      // 1. Polyline de tous les points avant le 11e (en noir)
      if (latlngs.length > 11) {
        L.polyline(latlngs.slice(0, 11), { color: '#333', weight: 3, interactive: false }).addTo(map);
      }

      // 2. Polyline entre le 11e et le 12e point (en gri
      if (latlngs.length > 11) {
    L.polyline([latlngs[10], latlngs[11]], {
        color: '#333', 
        weight: 3, 
        interactive: false,
        dashArray: '5, 5'  // 5px de ligne, 10px d'espace
    }).addTo(map);
}
      
      // 3. Polyline pour tous les points après le 12e (en noir)
      if (latlngs.length > 11) {
        L.polyline(latlngs.slice(11), { color: '#333', weight: 3, interactive: false }).addTo(map);
      }

      document.getElementById('loading-modal').style.display = 'none';
    }
  })
  .catch(error => {
    console.error('Erreur:', error);
  });
      
      const loadingText = document.getElementById('loading-text');
      let dots = 0;

      setInterval(() => {
        dots = (dots + 1) % 4;
        loadingText.textContent = 'Chargement' + '.'.repeat(dots);
      }, 400);
    </script>
  </body>
</html>
