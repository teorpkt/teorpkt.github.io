<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Grande Traversée des Pyrénées</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ==" crossorigin="" />
  <link rel="icon" href="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap">
  <style>
    *{font-family:'Roboto Mono',monospace;}
    html,body{height:100%;overflow:hidden;margin:0;padding:0;}
    #map{height:100%;width:100%;}
    .leaflet-marker-icon{pointer-events:none;}
    .leaflet-interactive{pointer-events:none;}
    .custom-icon{display:block;width:10px;height:10px;background-color:#000000;border-radius:50%;}
    .rotating-icon img{animation:spin 5s linear infinite;width:5.625rem;height:5.625rem;pointer-events:none;}
    @keyframes spin{0%{transform:rotate(0deg) scale(1);}25%{transform:rotate(90deg) scale(0.7);}50%{transform:rotate(180deg) scale(1);}75%{transform:rotate(270deg) scale(0.7);}100%{transform:rotate(360deg) scale(1);}}
    .leaflet-container{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
    .leaflet-container{touch-action:none;}
    #fixed-image{position:fixed;bottom:0.625rem;right:0.625rem;z-index:9999;height:5rem;width:auto;transform:rotate(2deg);}
    #loading-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,1);display:flex;justify-content:center;align-items:center;z-index:10000;}
    #loading-modal p{font-size:1rem;color:#000000;margin:0;}
  </style>
</head>
<body>
  <div id="loading-modal"><p>Chargement...</p></div>
  <img id="fixed-image" src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/logo.svg" alt="Logo"/>
  <div id="map"></div>
  <audio id="click-sound" src="https://cdn.pixabay.com/download/audio/2023/12/09/audio_37d2c0e795.mp3"></audio>
  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js" integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew==" crossorigin=""></script>
  <script>
    const map=L.map('map').setView([0,0],15);
    L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png',{maxZoom:15,minZoom:6}).addTo(map);
    const defaultAttributionControl=map.attributionControl;
    if(defaultAttributionControl){map.removeControl(defaultAttributionControl);}
    const loadingModal=document.getElementById('loading-modal');
    const apiUrl='https://script.google.com/macros/s/AKfycbwo5X8Fkf1fJKowKsxiLNiV5La_zaBFKChObf1C1OYWfsnDt1vG0uvXgEwxthiRE_5Z/exec';
    fetch(apiUrl).then(response=>{if(!response.ok){throw new Error('Erreur HTTP! Statut: '+response.status);}return response.json();}).then(data=>{if(Array.isArray(data)&&data.length>0&&data[0].hasOwnProperty('lat')&&data[0].hasOwnProperty('lng')){const latlngs=data.map(point=>[point.lat,point.lng]);const lastPoint=latlngs[latlngs.length-1];map.setView(lastPoint,10);const lastIcon=L.divIcon({className:'rotating-icon',html:'<img src="https://raw.githubusercontent.com/teorpkt/teorpkt.github.io/main/icon.svg" alt="Icon"/>',iconSize:['90','90'],iconAnchor:['45','45']});latlngs.forEach((latlng,index)=>{const icon=index===latlngs.length-1?lastIcon:L.divIcon({className:'custom-icon',iconSize:[10,10],iconAnchor:[5,5]});const marker=L.marker(latlng,{icon:icon,interactive:index===latlngs.length-1}).addTo(map);if(index===latlngs.length-1){marker.on('click',function(){const sound=document.getElementById('click-sound');sound.play();});}});L.polyline(latlngs,{color:'#000000',weight:3,interactive:false}).addTo(map);loadingModal.style.display='none';}}).catch(error=>{console.error('Erreur:',error);loadingModal.style.display='none';});
  </script>
</body>
</html>
